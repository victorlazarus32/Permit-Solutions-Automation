{% extends "base.html" %}
{% block title %}Change password{% endblock %}

{% block content %}

<section class="hero">
  <div class="lead-hero-row">
    <div>
      <p class="lead-breadcrumb"><a href="{{ url_for('dashboard') }}">Dashboard</a> · Change password</p>
      <h1>Change password</h1>
      <p class="hero-sub">Signed in as <span class="mono">{{ current_user }}</span></p>
    </div>
  </div>
</section>

<div class="lead-card" style="max-width: 520px;">
  <form method="POST">
    <div class="form-row single">
      <div class="form-field">
        <label for="current_password">Current password</label>
        <input type="password" name="current_password" id="current_password" required autocomplete="current-password">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-field">
        <label for="new_password">New password</label>
        <input type="password" name="new_password" id="new_password" required minlength="8" autocomplete="new-password">
        <small style="color: var(--ink-mute); font-size: 0.78rem;">At least 8 characters.</small>
      </div>
    </div>
    <div class="form-row single">
      <div class="form-field">
        <label for="confirm_password">Confirm new password</label>
        <input type="password" name="confirm_password" id="confirm_password" required minlength="8" autocomplete="new-password">
      </div>
    </div>
    <div class="form-actions" style="margin-top: 1rem; display: flex; gap: 0.75rem;">
      <button type="submit" class="btn-primary">Update password</button>
      <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
